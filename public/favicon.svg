<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <clipPath id="c">
      <rect x="4" y="5" width="24" height="9" rx="2"/>
    </clipPath>
  </defs>
  <!-- Purple background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Clapperboard top bar (white base) -->
  <rect x="4" y="5" width="24" height="9" rx="2" fill="white"/>
  <!-- Diagonal stripes on top bar -->
  <g clip-path="url(#c)" fill="rgba(30,0,80,0.4)">
    <polygon points="4,14 9,14 5,5 0,5"/>
    <polygon points="14,14 19,14 15,5 10,5"/>
    <polygon points="24,14 29,14 25,5 20,5"/>
  </g>
  <!-- Clapperboard body -->
  <rect x="4" y="15" width="24" height="13" rx="2" fill="white"/>
  <!-- Cute face -->
  <circle cx="13" cy="20.5" r="1.5" fill="#7c3aed"/>
  <circle cx="19" cy="20.5" r="1.5" fill="#7c3aed"/>
  <path d="M13 23.5 Q16 25.5 19 23.5" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
